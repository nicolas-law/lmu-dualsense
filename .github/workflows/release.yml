name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ".[dev]"
      - run: ruff check src/
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-20.04  # glibc 2.31 — broadest distro compatibility

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-hidraw0 libhidapi-dev

      - name: Install project and build tools
        run: pip install pyinstaller .

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name sim-dualsense \
            --collect-all dearpygui \
            main.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sim-dualsense
          generate_release_notes: true
